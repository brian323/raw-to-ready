<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raw To Ready</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<section style="text-align:center; padding:40px;">

<h1>Turn what you already have into assets you can actually use</h1>
<div style="max-width:700px; margin:20px auto; text-align:center;">

    <source src="videos/lynette-2.mp4" type="video/mp4">
  </video>
</div>

<div style="max-width:700px; margin:20px auto;">
  <video controls width="100%">
    <source src="videos/YOUR-VIDEO.mp4" type="video/mp4">
  </video>
</div>

<a href="https://calendly.com/brian-my6fa/intro-meeting-with-brian" target="_blank">
  Book 15 minute call
</a>

<form action="https://formspree.io/f/xqegbvgn" method="POST" style="margin-top:20px;">
  <input type="text" name="name" placeholder="Name" required /><br><br>
  <input type="email" name="email" placeholder="Email" required /><br><br>
  <textarea name="message" placeholder="What do you need?" required></textarea><br><br>
  <button type="submit">Send</button>
</form>

</section>
